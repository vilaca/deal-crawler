name: Generate Price Report

on:
  push:
    branches: [main]
    paths:
      - 'history/all/*.csv'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  report:
    name: Generate Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report
        run: |
          set -euo pipefail

          MARKDOWN_OUTPUT="latest_results.md"

          python generate_report.py --output "$MARKDOWN_OUTPUT"

          # Verify output
          if [ ! -s "$MARKDOWN_OUTPUT" ]; then
            echo "Error: Report generation failed"
            exit 1
          fi

          if ! grep -q "| Product | Price | Link |" "$MARKDOWN_OUTPUT"; then
            echo "Error: Report does not contain expected table"
            cat "$MARKDOWN_OUTPUT"
            exit 1
          fi

          echo "Report generated successfully"

      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add latest_results.md
          git diff --staged --quiet || git commit -m "Update report - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
